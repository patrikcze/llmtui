name: Release

# Only annotated/lightweight tags shaped like v1.2.3 (or v1.2.3-rc1) publish
# a release. Regular pushes to master run CI only.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race ./...

  release:
    name: Build and publish release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # Full history so release notes can diff against the previous tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile release binaries
        run: make dist VERSION="${GITHUB_REF_NAME}"

      - name: Generate release notes
        run: bash .github/scripts/release-notes.sh "${GITHUB_REF_NAME}" > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          case "$GITHUB_REF_NAME" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "llmtui $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag \
            $prerelease_flag
