name: Release

# Only annotated/lightweight tags shaped like v1.2.3 (or v1.2.3-rc1) publish
# a release. Regular pushes to master run CI only.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race ./...

  release:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goos: darwin
            goarch: arm64
            cgo: "1"
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            cgo: "1"
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "0"
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            cgo: "0"
          - runner: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release platform
        shell: bash
        run: >-
          make dist-platform VERSION="${GITHUB_REF_NAME}"
          TARGET_GOOS=${{ matrix.goos }}
          TARGET_GOARCH=${{ matrix.goarch }}
          CGO_ENABLED=${{ matrix.cgo }}

      - name: Upload release platform
        uses: actions/upload-artifact@v7
        with:
          name: llmtui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          # Full history so release notes can diff against the previous tag.
          fetch-depth: 0

      - name: Download release platforms
        uses: actions/download-artifact@v8
        with:
          pattern: llmtui-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && shasum -a 256 * > checksums.txt

      - name: Generate release notes
        run: bash .github/scripts/release-notes.sh "${GITHUB_REF_NAME}" > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          case "$GITHUB_REF_NAME" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "llmtui $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag \
            $prerelease_flag
