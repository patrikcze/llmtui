name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Format, vet, test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Build
        run: make build

  release-build:
    name: Release build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goos: darwin
            goarch: arm64
            cgo: "1"
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            cgo: "1"
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: "0"
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            cgo: "0"
          - runner: windows-latest
            goos: windows
            goarch: amd64
            cgo: "0"
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # macOS uses the real cgo runtime because Metal creates native threads;
      # Linux and Windows keep the portable no-cgo release configuration.
      - name: Build release platform
        shell: bash
        run: >-
          make dist-platform VERSION=ci-smoke
          TARGET_GOOS=${{ matrix.goos }}
          TARGET_GOARCH=${{ matrix.goarch }}
          CGO_ENABLED=${{ matrix.cgo }}
